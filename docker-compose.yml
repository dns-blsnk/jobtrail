services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      API_PORT: ${API_PORT:-4001}
      NODE_ENV: development
    restart: unless-stopped
    ports:
      - '${API_PORT:-4001}:${API_PORT:-4001}'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:${API_PORT:-4001}/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-job_search_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-job_search_tracker}']
      interval: 10s
      timeout: 5s
      retries: 5

  mobile:
    profiles: ['mobile']
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
    environment:
      NODE_ENV: development
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      CI: '1'
    restart: unless-stopped
    ports:
      - '8081:8081'
      - '19000:19000'
      - '19001:19001'
      - '19002:19002'
      - '19006:19006'

volumes:
  postgres_data:
